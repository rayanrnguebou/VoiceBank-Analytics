version: "3.9"

# VOICEBANK ANALYTICS - Docker Compose complet
# Auteur : Nguebou Temgoua Rayan
# Usage  : docker compose up -d

services:

  # ─────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: voicebank_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicebank_db
      POSTGRES_USER: voicebank_user
      POSTGRES_PASSWORD: voicebank2024
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./voicebank_db/init:/docker-entrypoint-initdb.d
    networks:
      - voicebank_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicebank_user -d voicebank_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # pgAdmin
  # ─────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: voicebank_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: rayan@voicebank.cm
      PGADMIN_DEFAULT_PASSWORD: voicebank2024
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - voicebank_network
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────
  # API FastAPI
  # ─────────────────────────────────────
  api:
    build:
      context: ./voicebank_api
      dockerfile: Dockerfile
    container_name: voicebank_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://voicebank_user:voicebank2024@postgres:5432/voicebank_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./voicebank_ia/modeles_sauvegardes:/app/modeles_sauvegardes
    networks:
      - voicebank_network
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────
  # Interface React
  # ─────────────────────────────────────
  ui:
    build:
      context: ./voicebank_ui
      dockerfile: Dockerfile
    container_name: voicebank_ui
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - voicebank_network
    depends_on:
      - api

# ─────────────────────────────────────
# Volumes
# ─────────────────────────────────────
volumes:
  postgres_data:
    name: voicebank_postgres_data
  pgadmin_data:
    name: voicebank_pgadmin_data

# ─────────────────────────────────────
# Reseau
# ─────────────────────────────────────
networks:
  voicebank_network:
    name: voicebank_network
    driver: bridge
