# VOICEBANK ANALYTICS - Configuration Render
# Auteur : Nguebou Temgoua Rayan
# Place ce fichier a la RACINE de ton depot GitHub

services:

  # ─────────────────────────────────────
  # API FastAPI
  # ─────────────────────────────────────
  - type: web
    name: voicebank-api
    runtime: python
    rootDir: voicebank_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # a renseigner manuellement dans Render
      - key: GEMINI_API_KEY
        sync: false        # a renseigner manuellement dans Render
      - key: PYTHON_VERSION
        value: 3.10.12

  # ─────────────────────────────────────
  # Interface React (site statique)
  # ─────────────────────────────────────
  - type: web
    name: voicebank-ui
    runtime: static
    rootDir: voicebank_ui
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false        # URL de ton API deployee sur Render

  # ─────────────────────────────────────
  # Base de donnees PostgreSQL
  # ─────────────────────────────────────
databases:
  - name: voicebank-db
    databaseName: voicebank_db
    user: voicebank_user
    plan: free
